<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D STL Viewer</title>
</head>
<body>
<script type="module">
  import * as THREE from 'https://esm.sh/three';
  import { STLLoader } from 'https://esm.sh/three/examples/jsm/loaders/STLLoader.js';
  import { OrbitControls } from 'https://esm.sh/three/examples/jsm/controls/OrbitControls.js';

  // ---------- CONFIG: add more features here ----------
  const features = [
    {
      id: 'eye',
      label: 'eye',
      path: 'https://huggingface.co/datasets/kush1434/awg_retina_tomography_ui/resolve/main/sample_1_seg_mesh/eye.stl',
      color: 0x22cc55,
      opacity: 0.2
    },
    {
      id: 'feature',
      label: 'feature',
      path: 'https://huggingface.co/datasets/kush1434/awg_retina_tomography_ui/resolve/main/sample_1_seg_mesh/feature.stl',
      color: 0x0077ff,
      opacity: 1.0
    },
  ];
  // ----------------------------------------------------

  // ---- UI: sidebar + viewport ------------------------------------------------
  const sidebarWidth = 220;

  document.body.style.margin = '0';
  document.body.style.background = 'linear-gradient(#7E8DD0, #D2D5EB)';
  document.body.style.fontFamily = 'system-ui, -apple-system, Segoe UI, Roboto, Arial';

  // Sidebar
  const sidebar = document.createElement('div');
  sidebar.style.position = 'fixed';
  sidebar.style.left = '0';
  sidebar.style.top = '0';
  sidebar.style.bottom = '0';
  sidebar.style.width = sidebarWidth + 'px';
  sidebar.style.background = '#222';
  sidebar.style.color = '#f0f0f0';
  sidebar.style.borderRight = '1px solid rgba(0,0,0,0.1)';
  sidebar.style.padding = '14px 12px';
  sidebar.style.boxSizing = 'border-box';
  sidebar.innerHTML = `<div style="font-weight:600; margin-bottom:10px;">Layers</div>`;
  document.body.appendChild(sidebar);

  const controlsContainer = document.createElement('div');
  controlsContainer.style.display = 'grid';
  controlsContainer.style.gap = '8px';
  sidebar.appendChild(controlsContainer);

  for (const f of features) {
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.gap = '4px';

    const row = document.createElement('label');
    row.style.display = 'flex';
    row.style.gap = '8px';
    row.style.alignItems = 'center';
    row.style.cursor = 'pointer';
    row.style.userSelect = 'none';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = `toggle-${f.id}`;
    cb.dataset.featureId = f.id;

    const text = document.createElement('span');
    text.textContent = f.label;

    row.appendChild(cb);
    row.appendChild(text);

    // Loading bar container
    const progressContainer = document.createElement('div');
    progressContainer.id = `progress-${f.id}`;
    progressContainer.style.display = 'none';
    progressContainer.style.width = 'calc(100% - 28px)';
    progressContainer.style.height = '3px';
    progressContainer.style.background = 'rgba(255,255,255,0.1)';
    progressContainer.style.borderRadius = '2px';
    progressContainer.style.overflow = 'hidden';
    progressContainer.style.marginLeft = '28px';

    const progressBar = document.createElement('div');
    progressBar.id = `bar-${f.id}`;
    progressBar.style.height = '100%';
    progressBar.style.width = '0%';
    progressBar.style.background = 'linear-gradient(90deg, #4ade80, #22c55e)';
    progressBar.style.transition = 'width 0.3s ease';

    progressContainer.appendChild(progressBar);
    wrapper.appendChild(row);
    wrapper.appendChild(progressContainer);
    controlsContainer.appendChild(wrapper);
  }

  const viewport = document.createElement('div');
  viewport.id = 'viewport';
  viewport.style.position = 'fixed';
  viewport.style.left = sidebarWidth + 'px';
  viewport.style.right = '0';
  viewport.style.top = '0';
  viewport.style.bottom = '0';
  document.body.appendChild(viewport);

  // ---- Three.js setup --------------------------------------------------------
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 10000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  viewport.appendChild(renderer.domElement);

  function sizeRenderer() {
    const w = viewport.clientWidth;
    const h = viewport.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  sizeRenderer();
  window.addEventListener('resize', sizeRenderer);

  const controls = new OrbitControls(camera, renderer.domElement);

  // Lighting
  const hemi = new THREE.HemisphereLight(0xbec8ff, 0xffffff, 0.8);
  scene.add(hemi);

  const headlight = new THREE.DirectionalLight(0xffffff, 0.8);
  camera.add(headlight);
  scene.add(camera);

  const fill = new THREE.DirectionalLight(0xffffff, 0.3);
  fill.position.set(-1, -0.5, -1);
  scene.add(fill);

  const loader = new STLLoader();
  let baseCenterTranslation = null;
  const featureMeshes = new Map();

  function loadFeature(f, onDone) {
    const progressContainer = document.getElementById(`progress-${f.id}`);
    const progressBar = document.getElementById(`bar-${f.id}`);
    
    // Show loading bar
    if (progressContainer) progressContainer.style.display = 'block';
    if (progressBar) progressBar.style.width = '10%';

    loader.load(
      f.path,
      geometry => {
        if (progressBar) progressBar.style.width = '100%';
        
        geometry.computeBoundingBox();
        const center = new THREE.Vector3();
        geometry.boundingBox.getCenter(center);
        geometry.translate(-center.x, -center.y, -center.z);

        if (!baseCenterTranslation) {
          baseCenterTranslation = center.clone().multiplyScalar(-1);
        } else {
          geometry.translate(baseCenterTranslation.x, baseCenterTranslation.y, baseCenterTranslation.z);
          geometry.translate(center.x, center.y, center.z);
        }

        const mat = new THREE.MeshLambertMaterial({
          color: f.color,
          transparent: true,
          opacity: f.opacity,
          side: f.id === 'eye' ? THREE.DoubleSide : THREE.FrontSide,
          depthWrite: f.id === 'eye' ? false : true,
          depthTest: true
        });

        const mesh = new THREE.Mesh(geometry, mat);
        mesh.renderOrder = f.id === 'eye' ? 0 : 999;
        featureMeshes.set(f.id, mesh);
        scene.add(mesh);
        
        // Hide loading bar after a brief delay
        setTimeout(() => {
          if (progressContainer) progressContainer.style.display = 'none';
          if (progressBar) progressBar.style.width = '0%';
        }, 300);
        
        onDone?.(mesh);
      },
      xhr => {
        // Progress callback
        if (xhr.lengthComputable && progressBar) {
          const percentComplete = (xhr.loaded / xhr.total) * 100;
          progressBar.style.width = Math.min(percentComplete, 90) + '%';
        } else if (progressBar) {
          // Indeterminate progress
          progressBar.style.width = '50%';
        }
      },
      e => {
        console.error(`❌ ${f.id} load error:`, e);
        if (progressContainer) progressContainer.style.display = 'none';
        if (progressBar) progressBar.style.width = '0%';
        onDone?.(null);
      }
    );
  }

  // Checkbox handler
  controlsContainer.addEventListener('change', e => {
    const target = e.target;
    if (!(target instanceof HTMLInputElement) || target.type !== 'checkbox') return;
    const id = target.dataset.featureId;
    const f = features.find(x => x.id === id);
    if (!f) return;

    const existing = featureMeshes.get(id);
    if (target.checked) {
      if (existing) existing.visible = true;
      else loadFeature(f);
    } else {
      if (existing) existing.visible = false;
    }
  });

  camera.position.set(0, 0, 100);
  camera.lookAt(0, 0, 0);

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
